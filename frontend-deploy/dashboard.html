<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — AutoParts GT</title>
<link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">

</head>
<body><header class="main-nav" id="main-nav"></header><main class="page"><div class="pg-head"><div><h1>📊 Dashboard</h1><p class="pg-sub">Panel de control — AutoParts GT</p></div></div><div class="g-stats" id="sg"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;margin-bottom:1.5rem"><div class="card"><h3 style="margin-bottom:.8rem">💰 Ventas 7 días</h3><div id="cv" style="height:180px;display:flex;align-items:end;gap:3px"></div></div><div class="card"><h3 style="margin-bottom:.8rem">🏆 Top Repuestos</h3><div id="ct"></div></div></div></main><script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script><script src="js/api.js"></script><script>
if(!Auth.requireAdmin())throw'r';UI.renderNav();(async()=>{var r=await API.getDashboard();if(!r||!r.success)return;var d=r.data,s=d.resumen;document.getElementById('sg').innerHTML=[{l:'Repuestos',v:s.total_productos,i:'⚙️'},{l:'Bodegas',v:s.total_bodegas,i:'🏭'},{l:'Ventas Mes',v:'Q '+s.ventas_mes.toFixed(2),i:'💰'},{l:'Pendientes',v:s.ordenes_pendientes,i:'📋'},{l:'Clientes',v:s.total_usuarios,i:'👥'},{l:'Stock Bajo',v:d.alertas_stock,i:'⚠️'}].map(x=>'<div class="stat"><div class="s-ic" style="background:var(--accent-bg)">'+x.i+'</div><div class="s-val">'+x.v+'</div><div class="s-lbl">'+x.l+'</div></div>').join('');var vpd=d.ventas_por_dia,mx=Math.max(...vpd.map(v=>v.total),1);document.getElementById('cv').innerHTML=vpd.map(v=>'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:100%;height:'+Math.max((v.total/mx)*160,3)+'px;background:var(--brand);border-radius:3px 3px 0 0"></div><span style="font-size:.68rem;color:var(--text-3)">'+v.fecha.split('-')[2]+'</span></div>').join('');var mq=Math.max(...d.top_productos.map(p=>p.cantidad),1);document.getElementById('ct').innerHTML=d.top_productos.length?d.top_productos.map(p=>'<div style="margin-bottom:.6rem"><div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.15rem"><span style="color:var(--text-2)">'+p.nombre+'</span><span style="color:var(--brand);font-weight:600">'+p.cantidad+'</span></div><div style="height:4px;background:var(--cream);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+(p.cantidad/mq*100)+'%;background:var(--brand);border-radius:2px"></div></div></div>').join(''):'<p style="color:var(--text-3);text-align:center;padding:1.5rem">Sin datos</p>'})();
</script></body></html>
