<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Repuestos — AutoParts GT</title>
<link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">

</head>
<body><header class="main-nav" id="main-nav"></header><main class="page"><div class="pg-head"><div><h1>⚙️ Repuestos</h1></div><div style="display:flex;gap:.5rem"><button class="btn btn-outline" onclick="catF()">+ Categoría</button><button class="btn btn-outline" onclick="mrcF()">+ Marca</button><button class="btn btn-primary" onclick="pf()">+ Nuevo Repuesto</button></div></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Repuesto</th><th># Parte</th><th>Categoría</th><th>Vehículo</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr></thead><tbody id="tb"></tbody></table></div></main><script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script><script src="js/api.js"></script><script>
if(!Auth.requireAdmin())throw'r';UI.renderNav();let ps=[],cs=[],ms=[];
async function ld(){var[rp,rc,rm]=await Promise.all([API.getProductos(),API.getCategorias(),API.getMarcas()]);if(rp&&rp.success)ps=rp.data;if(rc&&rc.success)cs=rc.data;if(rm&&rm.success)ms=rm.data;rn()}
function rn(){var b=document.getElementById('tb');if(!ps.length){b.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-3)">Sin repuestos</td></tr>';return}b.innerHTML=ps.map(p=>{var v=(p.marca_vehiculo||'')+(p.modelo_vehiculo?' '+p.modelo_vehiculo:'');var hasD=p.precio_descuento&&parseFloat(p.precio_descuento)>0&&parseFloat(p.precio_descuento)<parseFloat(p.precio);return'<tr><td><strong>'+p.nombre+'</strong>'+(p.marca_repuesto?'<br><small style="color:var(--text-3)">'+p.marca_repuesto+'</small>':'')+'</td><td><span class="pn">'+(p.numero_parte||'—')+'</span></td><td>'+(p.categoria_icono||'')+' '+(p.categoria_nombre||'—')+'</td><td style="font-size:.8rem">'+(v||'Universal')+'</td><td>'+(hasD?'<span class="price-old">'+UI.fc(p.precio)+'</span><br>':'')+' <strong style="color:var(--brand)">'+UI.fc(hasD?p.precio_descuento:p.precio)+'</strong></td><td><span class="badge '+(p.stock_total>10?'bg-ok':p.stock_total>0?'bg-warn':'bg-err')+'">'+p.stock_total+'</span></td><td><div style="display:flex;gap:.25rem"><button class="btn btn-ghost btn-sm" onclick="pf(\''+p.id+'\')">Editar</button><button class="btn btn-danger btn-sm" onclick="dl(\''+p.id+'\')">×</button></div></td></tr>'}).join('')}
function pf(id){var p=id?ps.find(x=>x.id===id):null;var co=cs.map(c=>'<option value="'+c.id+'"'+(p&&p.categoria_id===c.id?' selected':'')+'>'+c.icono+' '+c.nombre+'</option>').join('');var mo=ms.map(m=>'<option value="'+m.nombre+'"'+(p&&p.marca_vehiculo===m.nombre?' selected':'')+'>'+m.nombre+'</option>').join('');UI.showModal(p?'Editar':'Nuevo Repuesto','<div class="fr"><div class="fg"><label class="fl">Nombre</label><input class="fi" id="pn" value="'+(p?p.nombre:'')+'"></div><div class="fg"><label class="fl"># Parte</label><input class="fi" id="pp" value="'+(p?p.numero_parte:'')+'"></div></div><div class="fr3"><div class="fg"><label class="fl">Precio</label><input type="number" step="0.01" class="fi" id="pr" value="'+(p?p.precio:'')+'"></div><div class="fg"><label class="fl">Precio Descuento</label><input type="number" step="0.01" class="fi" id="pd" value="'+(p?p.precio_descuento:'')+'"></div><div class="fg"><label class="fl">Costo</label><input type="number" step="0.01" class="fi" id="pc" value="'+(p?p.costo:'')+'"></div></div><div class="fr3"><div class="fg"><label class="fl">Categoría</label><select class="fs" id="pk"><option value="">Seleccione</option>'+co+'</select></div><div class="fg"><label class="fl">Marca Vehículo</label><select class="fs" id="pm"><option value="">Universal</option>'+mo+'</select></div><div class="fg"><label class="fl">Condición</label><select class="fs" id="pco"><option value="nuevo">Nuevo</option><option value="usado"'+(p&&p.condicion==='usado'?' selected':'')+'>Usado</option><option value="remanufacturado"'+(p&&p.condicion==='remanufacturado'?' selected':'')+'>Remanufacturado</option></select></div></div><div class="fr3"><div class="fg"><label class="fl">Modelo Vehículo</label><input class="fi" id="pmo" value="'+(p?p.modelo_vehiculo:'')+'"></div><div class="fg"><label class="fl">Año Desde</label><input type="number" class="fi" id="pad" value="'+(p?p.anio_desde:'')+'"></div><div class="fg"><label class="fl">Año Hasta</label><input type="number" class="fi" id="pah" value="'+(p?p.anio_hasta:'')+'"></div></div><div class="fr"><div class="fg"><label class="fl">Marca Repuesto</label><input class="fi" id="pmr" value="'+(p?p.marca_repuesto:'')+'"></div><div class="fg"><label class="fl">URL Imagen</label><input class="fi" id="pi" value="'+(p?p.imagen_url:'')+'"></div></div><div class="fg"><label class="fl">Descripción</label><textarea class="ft" id="pde">'+(p?p.descripcion:'')+'</textarea></div>',{footer:'<button class="btn btn-outline" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="sp(\''+( id||'')+'\')">Guardar</button>',size:'lg'})}
async function sp(id){var d={nombre:document.getElementById('pn').value,numero_parte:document.getElementById('pp').value,precio:document.getElementById('pr').value,precio_descuento:document.getElementById('pd').value,costo:document.getElementById('pc').value,categoria_id:document.getElementById('pk').value,marca_vehiculo:document.getElementById('pm').value,modelo_vehiculo:document.getElementById('pmo').value,anio_desde:document.getElementById('pad').value,anio_hasta:document.getElementById('pah').value,marca_repuesto:document.getElementById('pmr').value,condicion:document.getElementById('pco').value,imagen_url:document.getElementById('pi').value,descripcion:document.getElementById('pde').value};if(!d.nombre||!d.precio)return UI.toast('Nombre y precio requeridos','warning');var r=id?await API.updateProducto(id,d):await API.createProducto(d);if(r&&r.success){UI.closeModal();UI.toast('Guardado','success');ld()}else UI.toast(r?r.error:'Error','error')}
async function dl(id){if(await UI.confirm('¿Desactivar?')){var r=await API.deleteProducto(id);if(r&&r.success){UI.toast('Desactivado','success');ld()}}}
function catF(){UI.showModal('Nueva Categoría','<div class="fg"><label class="fl">Nombre</label><input class="fi" id="cn"></div><div class="fr"><div class="fg"><label class="fl">Icono</label><input class="fi" id="ci" value="🔧"></div><div class="fg"><label class="fl">Descripción</label><input class="fi" id="cd"></div></div>',{footer:'<button class="btn btn-outline" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="scf()">Guardar</button>',size:'sm'})}
async function scf(){var r=await API.createCategoria({nombre:document.getElementById('cn').value,icono:document.getElementById('ci').value,descripcion:document.getElementById('cd').value});if(r&&r.success){UI.closeModal();UI.toast('Creada','success');ld()}else UI.toast(r?r.error:'Error','error')}
function mrcF(){UI.showModal('Nueva Marca','<div class="fg"><label class="fl">Marca</label><input class="fi" id="mn" placeholder="Toyota, Honda..."></div>',{footer:'<button class="btn btn-outline" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="smf()">Guardar</button>',size:'sm'})}
async function smf(){var r=await API.createMarca({nombre:document.getElementById('mn').value});if(r&&r.success){UI.closeModal();UI.toast('Creada','success');ld()}else UI.toast(r?r.error:'Error','error')}
ld();
</script></body></html>
