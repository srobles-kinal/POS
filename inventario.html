<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Inventario — AutoParts GT</title>
<link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/nav.css"><link rel="stylesheet" href="css/components.css">

</head>
<body><header class="main-nav" id="main-nav"></header><main class="page"><div class="pg-head"><div><h1>📋 Inventario</h1></div><div style="display:flex;gap:.5rem"><button class="btn btn-outline" onclick="tf()">Transferir</button><button class="btn btn-primary" onclick="af()">Ajustar Stock</button></div></div><div style="margin-bottom:1rem"><select class="fs" id="fb" onchange="li()" style="width:auto;min-width:180px"><option value="">Todas las bodegas</option></select></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Repuesto</th><th># Parte</th><th>Bodega</th><th>Estante</th><th>Cant.</th><th>Mín</th><th>Estado</th></tr></thead><tbody id="tb"></tbody></table></div></main><script src="js/config.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script><script src="js/api.js"></script><script>
if(!Auth.requireAdmin())throw'r';UI.renderNav();let inv=[],ps=[],bs=[];
async function la(){var[rb,rp]=await Promise.all([API.getBodegas(),API.getProductos()]);if(rb&&rb.success){bs=rb.data;document.getElementById('fb').innerHTML='<option value="">Todas</option>'+bs.map(b=>'<option value="'+b.id+'">'+b.nombre+'</option>').join('')}if(rp&&rp.success)ps=rp.data;li()}
async function li(){var r=await API.getInventario(document.getElementById('fb').value);if(!r||!r.success)return;inv=r.data;var b=document.getElementById('tb');if(!inv.length){b.innerHTML='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-3)">Sin registros</td></tr>';return}b.innerHTML=inv.map(i=>'<tr'+(i.alerta_stock?' style="background:var(--err-bg)"':'')+'><td><strong>'+i.producto_nombre+'</strong></td><td><span class="pn">'+(i.numero_parte||'—')+'</span></td><td>'+i.bodega_nombre+'</td><td style="font-family:var(--font-m);font-size:.8rem">'+(i.ubicacion_estante||'—')+'</td><td style="font-weight:700;color:'+(i.alerta_stock?'var(--err)':'var(--text)')+'">'+i.cantidad+'</td><td>'+i.stock_minimo+'</td><td>'+(i.alerta_stock?'<span class="badge bg-err">⚠ Bajo</span>':'<span class="badge bg-ok">OK</span>')+'</td></tr>').join('')}
function af(){var po=ps.filter(p=>p.estado==='activo').map(p=>'<option value="'+p.id+'">'+p.nombre+(p.numero_parte?' (#'+p.numero_parte+')':'')+'</option>').join('');var bo=bs.filter(b=>b.estado==='activa').map(b=>'<option value="'+b.id+'">'+b.nombre+'</option>').join('');UI.showModal('Ajustar Stock','<div class="fg"><label class="fl">Repuesto</label><select class="fs" id="ap"><option>Seleccione</option>'+po+'</select></div><div class="fg"><label class="fl">Bodega</label><select class="fs" id="ab"><option>Seleccione</option>'+bo+'</select></div><div class="fr3"><div class="fg"><label class="fl">Cantidad</label><input type="number" class="fi" id="ac" value="0"></div><div class="fg"><label class="fl">Mínimo</label><input type="number" class="fi" id="am" value="5"></div><div class="fg"><label class="fl">Estante</label><input class="fi" id="ae" placeholder="A-01"></div></div>',{footer:'<button class="btn btn-outline" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="sa()">Guardar</button>'})}
async function sa(){var r=await API.setInventario({producto_id:document.getElementById('ap').value,bodega_id:document.getElementById('ab').value,cantidad:parseInt(document.getElementById('ac').value),stock_minimo:parseInt(document.getElementById('am').value),ubicacion_estante:document.getElementById('ae').value});if(r&&r.success){UI.closeModal();UI.toast('Actualizado','success');li()}else UI.toast(r?r.error:'Error','error')}
function tf(){var po=ps.filter(p=>p.estado==='activo').map(p=>'<option value="'+p.id+'">'+p.nombre+'</option>').join('');var bo=bs.filter(b=>b.estado==='activa').map(b=>'<option value="'+b.id+'">'+b.nombre+'</option>').join('');UI.showModal('Transferir','<div class="fg"><label class="fl">Repuesto</label><select class="fs" id="tp"><option>Seleccione</option>'+po+'</select></div><div class="fr"><div class="fg"><label class="fl">Origen</label><select class="fs" id="to"><option>Seleccione</option>'+bo+'</select></div><div class="fg"><label class="fl">Destino</label><select class="fs" id="td"><option>Seleccione</option>'+bo+'</select></div></div><div class="fg"><label class="fl">Cantidad</label><input type="number" class="fi" id="tc" value="1"></div>',{footer:'<button class="btn btn-outline" onclick="UI.closeModal()">Cancelar</button><button class="btn btn-primary" onclick="st()">Transferir</button>'})}
async function st(){var r=await API.transferirInventario({producto_id:document.getElementById('tp').value,bodega_origen:document.getElementById('to').value,bodega_destino:document.getElementById('td').value,cantidad:parseInt(document.getElementById('tc').value)});if(r&&r.success){UI.closeModal();UI.toast('Transferencia exitosa','success');li()}else UI.toast(r?r.error:'Error','error')}la();
</script></body></html>
